name: Build Stockfish iOS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Stockfish
        run: git clone https://github.com/official-stockfish/Stockfish.git

      - name: Build Stockfish (manual compile, WORKING)
  run: |
    cd Stockfish/src

    SDK=$(xcrun --sdk iphoneos --show-sdk-path)

    clang++ -std=c++17 -O3 \
      -isysroot $SDK \
      -arch arm64 \
      -miphoneos-version-min=15.0 \
      -DNDEBUG \
      -DUSE_NEON \
      -pthread \
      *.cpp \
      -o stockfish

    # Convert to static library
    ar rcs libstockfish.a *.o || true

      - name: Move library
        run: |
          mkdir -p Engine
          cp Stockfish/src/libstockfish.a Engine/

      - name: Commit library
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Engine/libstockfish.a
          git commit -m "Add compiled Stockfish lib" || echo "No changes"
          git push