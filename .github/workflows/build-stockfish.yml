name: Build Stockfish + NNUE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone Stockfish
        run: |
          git clone https://github.com/official-stockfish/Stockfish.git

      - name: Build Stockfish (ARM64)
        run: |
          cd Stockfish/src
          make clean
          make build ARCH=armv8

      - name: Create Resources folder
        run: mkdir -p Resources

      - name: Copy binary
        run: cp Stockfish/src/stockfish Resources/stockfish

      - name: Make executable
        run: chmod +x Resources/stockfish

      - name: Download NNUE
        run: |
          curl -L https://tests.stockfishchess.org/api/nn/nn-62ef826d1a6d.nnue -o Resources/nnue.nnue

      - name: Verify binary
        run: file Resources/stockfish

      - name: Strip binary (smaller size)
        run: strip Resources/stockfish || true

      - name: Commit to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Resources/stockfish Resources/nnue.nnue
          git commit -m "Add Stockfish iOS binary + NNUE" || echo "No changes"
          git push