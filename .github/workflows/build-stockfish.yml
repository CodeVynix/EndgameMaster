name: Build Stockfish iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone Stockfish
        run: |
          git clone https://github.com/official-stockfish/Stockfish.git

      - name: Build static lib (iOS ARM64)
        run: |
          cd Stockfish/src

          SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          # Compile all .cpp files into .o
          for file in *.cpp; do
            clang++ -c "$file" \
              -std=c++17 \
              -O3 \
              -isysroot $SDK \
              -arch arm64 \
              -miphoneos-version-min=15.0 \
              -DNDEBUG \
              -DUSE_NEON \
              -pthread
          done

          # Create static library
          ar rcs libstockfish.a *.o

      - name: Move library
        run: |
          mkdir -p Engine
          cp Stockfish/src/libstockfish.a Engine/

      - name: Upload artifact (no commit needed)
        uses: actions/upload-artifact@v4
        with:
          name: stockfish-ios-lib
          path: Engine/libstockfish.a