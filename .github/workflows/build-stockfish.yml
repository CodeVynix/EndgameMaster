name: Build Stockfish iOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Stockfish
        run: git clone https://github.com/official-stockfish/Stockfish.git

      - name: Build Stockfish (FIXED)
        run: |
          cd Stockfish/src

          SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          clang++ -std=c++17 -O3 \
            -isysroot $SDK \
            -arch arm64 \
            -miphoneos-version-min=15.0 \
            -DNDEBUG \
            -DUSE_NEON \
            -pthread \
            *.cpp \
            -o stockfish

          ar rcs libstockfish.a *.o

      - name: Move library
        run: |
          mkdir -p Engine
          cp Stockfish/src/libstockfish.a Engine/

      - name: Commit library
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Engine/libstockfish.a

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Add compiled Stockfish lib"
            git push
          fi