name: Build iOS Stockfish

on:
  push:
    paths:
      - '.github/workflows/build-stockfish.yml'
      - 'Stockfish/**'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Stockfish
        run: git clone https://github.com/official-stockfish/Stockfish.git

      - name: Build static lib (ARM64 iOS)
        run: |
          cd Stockfish/src
          make clean
          make build ARCH=armv8 COMP=clang CXXFLAGS="-target arm64-apple-ios15.0 -O3"

      - name: Create static library
        run: |
          cd Stockfish/src
          libtool -static *.o -o libstockfish.a

      - name: Copy to project
        run: |
          cp Stockfish/src/libstockfish.a Engine/

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Engine/libstockfish.a
          git commit -m "Add compiled Stockfish lib" || echo "No changes"
          git push