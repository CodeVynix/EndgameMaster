name: iOS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Build Stockfish (iOS ARM64)
        run: |
          git clone https://github.com/official-stockfish/Stockfish.git
          cd Stockfish/src

          SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          clang++ -std=c++17 -O3 -arch arm64 -isysroot $SDK -c *.cpp

          cd ../..

          clang++ -std=c++17 -O3 -arch arm64 -isysroot $SDK -c Engine/stockfish_wrapper.cpp

          mkdir -p Engine
          ar rcs Engine/libstockfish.a Stockfish/src/*.o Engine/stockfish_wrapper.o

      - name: Generate project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -project EndgameMaster.xcodeproj \
            -scheme EndgameMaster \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build