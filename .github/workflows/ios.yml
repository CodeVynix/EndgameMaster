name: iOS Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest   # 👈 you wanted this
    steps:
      - uses: actions/checkout@v4

      - name: Clean old library
  run: |
    rm -f Engine/libstockfish.a
    rm -f Engine/*.o

      - name: Build Stockfish for iOS
  run: |
    cd Engine

    # Compile wrapper
    clang++ -std=c++17 -O3 -arch arm64 \
    -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
    -c stockfish_wrapper.cpp -o stockfish_wrapper.o

    # Create static library
    ar rcs libstockfish.a stockfish_wrapper.o

      - name: List Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Clean
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf EndgameMaster.xcodeproj

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
          -project EndgameMaster.xcodeproj \
          -scheme EndgameMaster \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          build