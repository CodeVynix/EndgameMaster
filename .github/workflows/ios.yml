name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Build Stockfish
        run: |
          git clone https://github.com/official-stockfish/Stockfish.git
          cd Stockfish/src

          make build ARCH=armv8 COMP=clang \
            CXX=clang++ \
            CXXFLAGS="-std=c++17 -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path)"

          mkdir -p ../../Engine
          ar rcs ../../Engine/libstockfish.a *.o

      - name: Verify symbols
        run: nm -g Engine/libstockfish.a | grep sf_ || true

      - name: Generate project
        run: xcodegen generate

      - name: Build app (NO SIGNING)
        run: |
          xcodebuild \
            -project EndgameMaster.xcodeproj \
            -scheme EndgameMaster \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build