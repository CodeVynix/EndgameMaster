name: iOS Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Ensure correct Xcode
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      # ✅ Clean EVERYTHING
      - name: Clean project
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf EndgameMaster.xcodeproj
          rm -f Engine/libstockfish.a
          rm -f Engine/*.o

      # ✅ Install XcodeGen
      - name: Install XcodeGen
        run: brew install xcodegen

      # ✅ Build Stockfish wrapper (iOS arm64)
      - name: Build Stockfish (TEMP WRAPPER)
        run: |
          cd Engine

          # Create wrapper if not exists
          cat <<EOF > stockfish_wrapper.cpp
          extern "C" {

          const char* sf_best_move(const char* fen) {
              return "e2e4";
          }

          void sf_send_command(const char* cmd) {}

          }
          EOF

          clang++ -std=c++17 -O3 -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -c stockfish_wrapper.cpp -o stockfish_wrapper.o

          ar rcs libstockfish.a stockfish_wrapper.o

      # ✅ Generate project
      - name: Generate project
        run: xcodegen generate

      # ✅ Build (no signing)
      - name: Build
        run: |
          xcodebuild \
          -project EndgameMaster.xcodeproj \
          -scheme EndgameMaster \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          build