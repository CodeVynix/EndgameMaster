name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Clean junk
      - name: Clean
        run: rm -rf ~/Library/Developer/Xcode/DerivedData || true

      # ✅ Install XcodeGen
      - name: Install XcodeGen
        run: brew install xcodegen

      # ✅ Generate project
      - name: Generate project
        run: xcodegen generate

      # ✅ Build Stockfish for iOS
      - name: Build Stockfish
        run: |
          git clone https://github.com/official-stockfish/Stockfish.git
          cd Stockfish/src

          make build ARCH=armv8 COMP=clang \
            CXX=clang++ \
            CXXFLAGS="-arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path)"

          mkdir -p ../../Engine
          ar rcs ../../Engine/libstockfish.a *.o

      # ✅ Verify symbols (debug)
      - name: Verify symbols
        run: nm -g Engine/libstockfish.a | grep sf_ || true

      # ✅ Build app (NO SIGNING)
      - name: Build app
        run: |
          xcodebuild \
          -project EndgameMaster.xcodeproj \
          -scheme EndgameMaster \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          build