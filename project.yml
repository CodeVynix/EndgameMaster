name: EndgameMaster

options:
  minimumXcodeGenVersion: 2.38.0

targets:
  EndgameMaster:
    type: application
    platform: iOS
    deploymentTarget: "15.0"

    sources:
      - path: .
        excludes:
          - .github
          - build
          - Stockfish
          - "*.yml"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codevynix.endgamemaster
        INFOPLIST_FILE: Info.plist
        SWIFT_VERSION: 5.0

        # ✅ REQUIRED for C++ interop
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        CLANG_CXX_LIBRARY: "libc++"

        # ✅ REQUIRED: bridge header
        SWIFT_OBJC_BRIDGING_HEADER: EndgameMaster-Bridging-Header.h

        # ✅ REQUIRED: link static library
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/Engine"
        OTHER_LDFLAGS: "-lstockfish"

    info:
      path: Info.plist
      properties:
        CFBundleName: EndgameMaster
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false