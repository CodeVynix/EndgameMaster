name: EndgameMaster

options:
  minimumXcodeGenVersion: 2.38.0

targets:
  EndgameMaster:
    type: application
    platform: iOS
    deploymentTarget: "15.0"

    sources:
      - Engine
      - Models
      - ViewModels
      - Views
      - Managers
      - ContentView.swift
      - EndgameMasterApp.swift

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codevynix.endgamemaster
        INFOPLIST_FILE: Info.plist
        SWIFT_VERSION: 5.0

        CLANG_CXX_LANGUAGE_STANDARD: c++17
        CLANG_CXX_LIBRARY: libc++

        SWIFT_OBJC_BRIDGING_HEADER: EndgameMaster-Bridging-Header.h

        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/Engine"
        OTHER_LDFLAGS: "-lstockfish"

    dependencies:
      - framework: Engine/libstockfish.a